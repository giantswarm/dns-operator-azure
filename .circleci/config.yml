version: 2.1

orbs:
  architect: giantswarm/architect@9.6.0

workflows:
  build:
    jobs:
      - architect/go-build:
          name: go-build
          context: architect
          resource_class: large
          binary: dns-operator-azure
          filters:
            tags:
              only: /^v.*/

      - architect/push-to-registries:
          name: push-to-registries
          context: architect
          # Skip the trans-Pacific Aliyun push in-line; the sync-china-registry
          # job below mirrors gsoci -> Aliyun from an in-China runner in parallel.
          split-china-push: true
          requires:
            - go-build
          filters:
            branches:
              ignore:
                - main
                - master
            tags:
              only: /^v.*/

      - architect/push-to-app-catalog:
          name: push-to-control-plane-catalog
          context: architect
          executor: app-build-suite
          chart: dns-operator-azure
          app_catalog: control-plane-catalog
          app_catalog_test: control-plane-test-catalog
          requires:
            - push-to-registries
          filters:
            branches:
              ignore:
                - main
                - master
            tags:
              only: /^v.*/

      # Mirror gsoci -> Aliyun via the in-China giantswarm/galaxy-runner, off the
      # push-to-registries critical path. Tag builds only (dev images don't push
      # to Aliyun).
      - architect/sync-china-registry:
          context: architect
          name: sync-china-registry
          requires:
            - push-to-registries
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
